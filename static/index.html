<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cymatix</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.5/dist/jsmediatags.min.js"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/static/cymatic.ico">

  <!-- No cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    body {
      background: black;
      margin: 0;
      padding: 0;
      overflow: hidden;
      color: white;
      font-family: sans-serif;
    }

    .custom-navbar {
      background-image: url('/static/navbar.jpg'); /* asegúrate de la ruta */
      background-size: contain;
      background-repeat: no-repeat;
      background-position: left center;
      background-color: rgba(0, 0, 0, 0.85);
      border-radius: 22px;
      padding: 10px 20px;
      margin: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      border-radius: 50px;
      font-size: 20px;
      padding: 5px 12px;
    }

    input[type="file"] {
      display: none;
    }

    .file-label {
      cursor: pointer;
    }

    #msg {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 8px 15px;
      border-radius: 12px;
      z-index: 10;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <nav class="custom-navbar">
    <div class="brand"></div>

    <div class="nav-buttons">
      <button class="btn btn-outline-light" onclick="playAudio()">▶</button>
      <button class="btn btn-outline-light" onclick="pauseAudio()">⏸</button>
      <button class="btn btn-outline-light" onclick="stopAudio()">⏹</button>
      <button class="btn btn-outline-light" onclick="startMic()">🎤</button>
      <label for="fileInput" class="btn btn-outline-light file-label">📁</label>
      <input type="file" id="fileInput" accept="audio/*">
    </div>
  </nav>

  <div id="msg"></div>
  <canvas id="canvas"></canvas>

  <audio id="audio" controls hidden></audio>
  <script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const msg = document.getElementById("msg");
  const audio = document.getElementById("audio");

  let audioCtx, analyser, source;
  let paletteColors = null; // 🎨 paleta global (nula = rainbow fallback)

  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function startVisualizer(analyser) {
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    function animate() {
      if (!analyser) return; // seguridad
      analyser.getByteFrequencyData(dataArray);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const radius = Math.min(cx, cy) * 0.4;
      const rings = 80;

      for (let i = 0; i < rings; i++) {
        const angleStep = (Math.PI * 2) / bufferLength;
        const r = radius * (i / rings);
        ctx.beginPath();
        for (let j = 0; j < bufferLength; j++) {
          const angle = j * angleStep;
          const amp = dataArray[j] / 255;
          const offset = amp * 40 * Math.sin(i * 0.2 + j * 0.1);
          const x = cx + (r + offset) * Math.cos(angle);
          const y = cy + (r + offset) * Math.sin(angle);
          j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();

        // 🎨 Si hay paleta, úsala. Si no, fallback rainbow.
        if (paletteColors && paletteColors.length > 0) {
          const color = paletteColors[i % paletteColors.length];
          ctx.strokeStyle = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
        } else {
          ctx.strokeStyle = `hsl(${(i * 4 + Date.now() * 0.1) % 360}, 100%, 50%)`;
        }

        ctx.lineWidth = 0.7;
        ctx.stroke();
      }

      requestAnimationFrame(animate);
    }
    animate();
  }

  // 🎤 Iniciar Micrófono
  function startMic() {
    msg.innerText = "🎤 Mic Check";
    paletteColors = null; // reset paleta (usa rainbow)
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;
      source.connect(analyser);
      startVisualizer(analyser);
    }).catch(err => {
      msg.innerText = "❌ Mic Error";
      console.error(err);
    });
  }

  // 📁 Cargar archivo MP3
  document.getElementById("fileInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    audio.src = url;
    audio.play();
    msg.innerText = "🎵 Playing: " + file.name;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    startVisualizer(analyser);

    // pedir paleta
    getPalette(file);
  });

  // 🎨 Obtener paleta desde Flask
  async function getPalette(file) {
    const formData = new FormData();
    formData.append("audio", file);

    try {
      const res = await fetch("/cover-palette", {
        method: "POST",
        body: formData
      });
      if (!res.ok) throw new Error("Error HTTP " + res.status);
      const palette = await res.json();
      console.log("🎨 Palette:", palette);
      paletteColors = palette;
    } catch (err) {
      console.error("Error fetching palette:", err);
      paletteColors = null;
    }
  }

  // ▶⏸⏹ Controles
  function playAudio() { if (audio.src) audio.play(); }
  function pauseAudio() { if (audio.src) audio.pause(); }
  function stopAudio() { if (audio.src) { audio.pause(); audio.currentTime = 0; } }
</script>


</body>
</html>
