<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visualizador Cymatics Dual</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      color: white;
      font-family: sans-serif;
    }
    canvas {
      display: block;
    }
    #msg {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 10px;
      z-index: 10;
    }
    #controls {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      border-radius: 10px;
    }
    #cymatic-img {
      position: absolute;
      top: 0;
      left: 0;
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="msg">🔊 Permite el micrófono o sube un archivo</div>
  <div id="controls">
    <button onclick="startMic()">🎤 Modo Micrófono</button>
    <input type="file" id="fileInput" accept=".mp3" />
  </div>
  <canvas id="canvas"></canvas>
  <img id="cymatic-img" />
  <audio id="audioPlayer" controls style="position:absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0,0,0,0.4); border-radius: 6px;"></audio>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('msg');
    const img = document.getElementById('cymatic-img');
    const fileInput = document.getElementById('fileInput');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let micStream;

    function startMic() {
      img.style.display = 'none';
      msg.innerText = '🔊 Visualizando desde micrófono...';
      if (micStream) micStream.getTracks().forEach(t => t.stop());

      navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
        micStream = stream;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;

        source.connect(analyser);
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const radius = Math.min(cx, cy) * 0.5;
        const rings = 100;

        function animate() {
          analyser.getByteFrequencyData(dataArray);
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (let i = 0; i < rings; i++) {
            const angleStep = (Math.PI * 2) / bufferLength;
            const r = radius * (i / rings);
            ctx.beginPath();
            for (let j = 0; j < bufferLength; j++) {
              const angle = j * angleStep;
              const amp = dataArray[j] / 255;
              const offset = amp * 50 * Math.sin(i * 0.3 + j * 0.2);
              const x = cx + (r + offset) * Math.cos(angle);
              const y = cy + (r + offset) * Math.sin(angle);
              if (j === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.closePath();
            const hue = (i * 3 + Date.now() * 0.05) % 360;
            ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }

          requestAnimationFrame(animate);
        }

        animate();
      }).catch(err => {
        msg.innerText = "❌ No se pudo acceder al micrófono";
        console.error(err);
      });
    }

    const audioPlayer = document.getElementById('audioPlayer');

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  msg.innerText = "📡 Subiendo y procesando archivo...";
  img.style.display = 'none';

  // Reproducir localmente el MP3
  const audioURL = URL.createObjectURL(file);
  audioPlayer.src = audioURL;
  audioPlayer.play();

  // Enviar al servidor para generar imagen cymática
  const formData = new FormData();
  formData.append("audio", file);

  const res = await fetch('/visualize', {
    method: 'POST',
    body: formData
  });

  if (!res.ok) {
    msg.innerText = "❌ Error al procesar el audio";
    return;
  }

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  img.src = url;
  img.style.display = 'block';
  msg.innerText = "✅ Visualización generada desde MP3";
});

  </script>
</body>
</html>
